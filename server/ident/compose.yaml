services:
  percept-ident:
    build: .
    container_name: percept-ident
    ports:
      - "8125:8000"
    volumes:
      - percept-ident-models:/models
    environment:
      - IDENT_THREADS=2
    restart: unless-stopped

volumes:
  percept-ident-models:
    # Pinned to the existing physical volume so this resolves identically
    # standalone (project "ident") and under the unified root (project "percept").
    name: ident_percept-ident-models
