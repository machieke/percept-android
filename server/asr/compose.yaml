services:
  percept-asr:
    build: .
    container_name: percept-asr
    ports:
      - "8123:8000"
    volumes:
      - percept-asr-models:/models
    environment:
      - ASR_THREADS=4
    restart: unless-stopped

volumes:
  percept-asr-models:
    # Pinned to the existing physical volume so this resolves identically
    # standalone (project "asr") and under the unified root (project "percept").
    name: asr_percept-asr-models
