services:
  percept-browser:
    build: .
    container_name: percept-browser
    # Read-only view of the memory server's data volume — the browser can never
    # mutate the trace, only read pointers.jsonl and the content-addressed store.
    volumes:
      - memory-data-ro:/data:ro
    environment:
      - DATA_ROOT=/data
    ports:
      - "8131:8131"
    restart: unless-stopped

volumes:
  # The memory server's trace, mounted read-only. Distinct compose key from
  # memory's own volume so the two definitions do not collide when both files
  # merge into the unified root project; both resolve to the same physical
  # volume via the pinned name.
  memory-data-ro:
    external: true
    name: memory_percept-memory-data
