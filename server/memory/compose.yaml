services:
  percept-memory:
    build: .
    container_name: percept-memory
    # Host networking: ollama binds to 127.0.0.1 only, so the enrichment
    # worker must share the host loopback (also reaches percept-asr:8123).
    network_mode: host
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8124"]
    volumes:
      - percept-memory-data:/data
    environment:
      - ASR_URL=http://127.0.0.1:8123
      - IDENT_URL=http://127.0.0.1:8125
      - SPEAKER_SIM_THRESHOLD=0.40
      - OLLAMA_URL=http://127.0.0.1:11434
      - VLM_MODEL=gemma3:4b
      - LLM_MODEL=gemma3:4b
      - REASON_INTERVAL_S=900     # tier 1: cheap reasoning sweep cadence (entities/conclusions)
      - AUTO_DERIVE=1             # tier 2: auto-run per-session derivations on new sessions
      # - AUTO_ITEMS=1           # also auto-run open-vocab VLM item id per session (heavy on CPU ollama)
      # - ENRICH_ENABLED=0         # disable VLM/LLM enrichment (also gates the periodic worker)
      # - MEMORY_TOKEN=change-me   # uncomment to require a bearer token
    restart: unless-stopped

volumes:
  percept-memory-data:
