services:
  percept-memory:
    build: .
    container_name: percept-memory
    ports:
      - "8124:8000"
    volumes:
      - percept-memory-data:/data
    environment:
      - ASR_URL=http://host.docker.internal:8123
      - OLLAMA_URL=http://host.docker.internal:11434
      - VLM_MODEL=gemma3:4b
      - LLM_MODEL=gemma3:4b
      # - ENRICH_ENABLED=0         # disable VLM/LLM enrichment
      # - MEMORY_TOKEN=change-me   # uncomment to require a bearer token
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  percept-memory-data:
